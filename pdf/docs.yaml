document: オノコムメンバーズのご提案
company: 株式会社オノコム
date: '2025-09-17'
author:
  name: 斧山 洋一
  email: yonoyama@onocomm.co.jp
overview:
  service_name: オノコムメンバーズ
  description: AWS利用料連動モデルから脱却し、多様なニーズに応えるための新サブスクリプションプラン。アドバイザリー支援を拡張し、柔軟な伴走型サービスを提供。
  key_points:
  - 課題整理から伴走する月額1万円プラン
  - 短期集中支援『ブーストオプション』による柔軟なコスト最適化
  - 攻めのIT活用を支援し、ビジネス成長を加速
plans:
  casual:
    price: ¥10,000/月
    features:
    - AI・AWSクラウドの最新情報キャッチアップ
    - ポータルサイトアクセス（1名）
    - 'QA: 月5回まで'
    - AWSクラウドディスカウント適用
  members:
    price: ¥50,000/月
    features:
    - カジュアルプラン内容を含む
    - アクセス制限引き上げ
    - AI・クラウド作業支援（月5時間）
    - PoC計画・実行支援（AIベース）
    - セキュリティレビュー（AIベース）
    - 月1回の定例会（Web）
  boost:
    price: ¥200,000〜/月（メンバーズに追加）
    features:
    - アクセス制限引き上げ
    - 作業支援（月20時間〜）
    - PoC計画・実行支援（認定者対応）
    - セキュリティレビュー（認定者対応）
    - 月1回の定例会（対面）
service_spec:
  communication: ポータルサイト、Slackなど指定チャットツール
  support_hours: 平日10:00～17:00（時間外は翌営業日以降対応）
  sla: なし（ベストエフォート対応）
  qa_limit: 'プランごとの上限あり（例: 月5インシデント）'
  scope: AI・AWS仕様に関するQ&A、ベストプラクティス助言
  excluded: 障害調査、切り分け、復旧作業、即時応答
boost_option:
  price: ¥200,000〜/月
  min_contract: 1ヶ月
  features:
  - 作業支援（月20時間）
  - PoC計画・実行支援（認定者対応）
  - セキュリティレビュー（認定者対応）
  - 月1回定例会（対面）
contact:
